<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Login | BLF Schools</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="section">
<h2>Student Login</h2>
<div style="max-width:400px;margin:auto;">
<input type="text" id="studentID" placeholder="Student ID">
<input type="password" id="studentPass" placeholder="Password">
<button onclick="studentLogin()">Login</button>
<p id="loginMsg" style="color:red;margin-top:10px;"></p>
</div>

<script type="module">
import { supabase } from './scripts/supabase.js';

async function studentLogin(){
  const student_id = document.getElementById('studentID').value;
  const password = document.getElementById('studentPass').value;
  const { data, error } = await supabase
    .from('students')
    .select('*')
    .eq('student_id', student_id)
    .eq('password', password)
    .single();

  if(data){
    localStorage.setItem('student_id', student_id);
    window.location.href = 'result.html';
  } else {
    document.getElementById('loginMsg').innerText = 'Invalid Student ID or Password';
  }
}
</script>
</section>
</body>
</html>
