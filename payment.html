<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay School Fees | BLF Schools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="section">
<h2>Pay School Fees Online</h2>
<div style="max-width:400px;margin:auto;">
<input type="email" id="email-address" placeholder="Parent Email">
<input type="number" id="amount" placeholder="Amount (₦)">
<input type="text" id="student_id" placeholder="Student ID">
<button onclick="payWithPaystack()">Pay Now</button>
</div>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script type="module">
import { supabase } from './scripts/supabase.js';

function payWithPaystack(){
  const email=document.getElementById('email-address').value;
  const amount=document.getElementById('amount').value;
  const student_id=document.getElementById('student_id').value;
  const handler = PaystackPop.setup({
    key: 'YOUR_PUBLIC_KEY', // Replace with Paystack public key
    email: email,
    amount: amount*100,
    currency:'NGN',
    callback: async function(response){
      alert('Payment successful! Ref: '+response.reference);
      await supabase.from('payments').insert([{ student_id, amount, reference:response.reference, status:'Completed' }]);
    },
    onClose:function(){ alert('Transaction cancelled'); }
  });
  handler.openIframe();
}
</script>
</section>
</body>
</html>
