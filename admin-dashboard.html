<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | BLF Schools</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="section">
<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>

<h3>Add Student</h3>
<input type="text" id="studentID" placeholder="Student ID">
<input type="text" id="studentName" placeholder="Full Name">
<input type="password" id="studentPass" placeholder="Password">
<input type="text" id="studentClass" placeholder="Class">
<button onclick="addStudent()">Add Student</button>
<p id="addMsg" style="color:green;margin-top:10px;"></p>

<h3>Upload Result</h3>
<input type="text" id="resStudentID" placeholder="Student ID">
<input type="text" id="subject" placeholder="Subject">
<input type="number" id="score" placeholder="Score">
<button onclick="uploadResult()">Upload Result</button>
<p id="resMsg" style="color:green;margin-top:10px;"></p>

<h3>View Payments</h3>
<div id="paymentsList"></div>

<script type="module">
import { supabase } from './scripts/supabase.js';

const admin = localStorage.getItem('admin_email');
if(!admin){window.location.href='admin.html';}

async function logout(){localStorage.removeItem('admin_email');window.location.href='admin.html';}

async function addStudent(){
  const student_id=document.getElementById('studentID').value;
  const full_name=document.getElementById('studentName').value;
  const password=document.getElementById('studentPass').value;
  const student_class=document.getElementById('studentClass').value;
  const { data, error } = await supabase.from('students').insert([{ student_id, full_name, password, class: student_class }]);
  document.getElementById('addMsg').innerText = error ? error.message : 'Student Added Successfully';
}

async function uploadResult(){
  const student_id=document.getElementById('resStudentID').value;
  const subject=document.getElementById('subject').value;
  const score=parseInt(document.getElementById('score').value);
  const { data, error } = await supabase.from('results').insert([{ student_id, subject, score }]);
  document.getElementById('resMsg').innerText = error ? error.message : 'Result Uploaded Successfully';
}

async function loadPayments(){
  const { data } = await supabase.from('payments').select('*');
  let html='';
  data.forEach(p => {html+=`<p>${p.student_id}: ₦${p.amount} - ${p.status} - Ref: ${p.reference}</p>`});
  document.getElementById('paymentsList').innerHTML=html;
}
loadPayments();
</script>
</section>
</body>
</html>
